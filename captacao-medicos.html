<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jubarthi · Marketing Médico Premium</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:    #C9A84C;
      --gold-l:  #F5EDD6;
      --gold-d:  #A07830;
      --black:   #0A0A0A;
      --dark:    #141414;
      --dark2:   #1E1E1E;
      --dark3:   #2A2A2A;
      --gray:    #888888;
      --gray-l:  #CCCCCC;
      --white:   #FFFFFF;
      --radius:  20px;
      --shadow:  0 8px 40px rgba(201,168,76,.15);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background: var(--black);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: var(--dark);
      border: 1px solid rgba(201,168,76,.25);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 580px;
      overflow: hidden;
      animation: fadeUp .5s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #0A0A0A 0%, #1A1400 50%, #0A0A0A 100%);
      border-bottom: 1px solid rgba(201,168,76,.3);
      padding: 32px 36px 26px;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 180px; height: 180px;
      background: radial-gradient(circle, rgba(201,168,76,.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .logo {
      font-size: 11px; font-weight: 700;
      letter-spacing: .18em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 10px;
      opacity: .9;
    }
    .header-badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--gold), var(--gold-d));
      color: var(--black);
      font-size: 11px; font-weight: 800;
      letter-spacing: .06em;
      padding: 4px 12px;
      border-radius: 99px;
      margin-bottom: 14px;
      text-transform: uppercase;
    }
    .header-title {
      font-size: 20px; font-weight: 800;
      color: var(--white);
      line-height: 1.4;
      margin-bottom: 6px;
    }
    .header-title span { color: var(--gold); }
    .header-subtitle { font-size: 17px; font-weight: 600; color: var(--gray-l); margin: 6px 0 14px; letter-spacing: .01em; }
    .header-sub { font-size: 13px; color: var(--gray); line-height: 1.6; }

    /* ── Progress ── */
    .progress-wrap { padding: 18px 36px 0; }
    .progress-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--gray); margin-bottom: 8px; letter-spacing: .04em; }
    .progress-bar { height: 3px; background: var(--dark3); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold-d), var(--gold)); border-radius: 99px; transition: width .5s cubic-bezier(.4,0,.2,1); width: 0%; }

    /* ── Chat ── */
    .chat { padding: 26px 36px; min-height: 200px; }

    .bubble-bot { display: flex; align-items: flex-end; gap: 10px; margin-bottom: 20px; animation: bubbleIn .3s ease; }
    .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-d), var(--gold));
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      box-shadow: 0 2px 8px rgba(201,168,76,.3);
    }
    .bot-text {
      background: var(--dark2);
      border: 1px solid rgba(201,168,76,.15);
      border-radius: 18px 18px 18px 4px;
      padding: 13px 17px;
      font-size: 15px;
      color: var(--gray-l);
      line-height: 1.6;
      max-width: 86%;
    }
    .bot-text strong { color: var(--gold); }

    .typing { display: flex; align-items: center; gap: 5px; padding: 15px 17px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold); opacity: .5; animation: bounce .9s infinite; }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce { 0%,80%,100% { transform: scale(1); opacity:.4; } 40% { transform: scale(1.4); opacity:1; } }
    @keyframes bubbleIn { from { opacity:0; transform: translateX(-8px); } to { opacity:1; transform: translateX(0); } }

    .bubble-user { display: flex; justify-content: flex-end; margin-bottom: 16px; animation: bubbleInR .3s ease; }
    .user-text {
      background: linear-gradient(135deg, var(--gold-d), var(--gold));
      color: var(--black);
      border-radius: 18px 18px 4px 18px;
      padding: 11px 17px;
      font-size: 14px; font-weight: 600;
      max-width: 78%;
      line-height: 1.4;
    }
    @keyframes bubbleInR { from { opacity:0; transform: translateX(8px); } to { opacity:1; transform: translateX(0); } }

    /* ── Input area ── */
    .input-area { padding: 0 36px 30px; }

    .text-wrap { display: flex; gap: 10px; align-items: flex-end; }
    .text-input {
      flex: 1;
      border: 1.5px solid rgba(201,168,76,.25);
      border-radius: 14px;
      padding: 13px 16px;
      font-size: 15px;
      color: var(--white);
      outline: none;
      transition: border-color .2s;
      resize: none;
      font-family: inherit;
      background: var(--dark2);
      min-height: 50px;
      max-height: 120px;
    }
    .text-input::placeholder { color: var(--gray); }
    .text-input:focus { border-color: var(--gold); }
    .send-btn {
      width: 50px; height: 50px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--gold-d), var(--gold));
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: transform .15s, opacity .15s;
      box-shadow: 0 2px 12px rgba(201,168,76,.3);
    }
    .send-btn:hover { transform: scale(1.05); }
    .send-btn:active { transform: scale(.95); opacity:.85; }
    .send-btn svg { width: 20px; height: 20px; fill: var(--black); }

    .options-wrap { display: flex; flex-wrap: wrap; gap: 10px; }
    .option-btn {
      background: var(--dark2);
      border: 1.5px solid rgba(201,168,76,.25);
      border-radius: 12px;
      padding: 11px 20px;
      font-size: 14px; font-weight: 500;
      color: var(--gray-l);
      cursor: pointer;
      transition: all .2s;
      font-family: inherit;
    }
    .option-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,.08); }

    .scale-wrap { display: flex; gap: 8px; flex-wrap: wrap; }
    .scale-btn {
      width: 46px; height: 46px;
      border-radius: 12px;
      border: 1.5px solid rgba(201,168,76,.25);
      background: var(--dark2);
      font-size: 15px; font-weight: 700;
      color: var(--gray-l);
      cursor: pointer;
      transition: all .2s;
      font-family: inherit;
    }
    .scale-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,.08); }

    /* ── Success ── */
    .success {
      padding: 52px 36px;
      text-align: center;
      animation: fadeUp .5s ease;
    }
    .success-icon {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-d), var(--gold));
      margin: 0 auto 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      box-shadow: 0 4px 24px rgba(201,168,76,.35);
    }
    .success-title { font-size: 24px; font-weight: 800; color: var(--white); margin-bottom: 12px; }
    .success-title span { color: var(--gold); }
    .success-sub { font-size: 15px; color: var(--gray); line-height: 1.7; margin-bottom: 6px; }
    .success-divider {
      width: 60px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 24px auto;
    }
    .ig-btn {
      display: inline-flex; align-items: center; gap: 10px;
      margin-top: 4px;
      background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      color: white; text-decoration: none;
      padding: 14px 26px; border-radius: 14px;
      font-size: 14px; font-weight: 700;
      transition: transform .15s, opacity .15s;
      box-shadow: 0 4px 16px rgba(220,39,67,.3);
      letter-spacing: .01em;
    }
    .ig-btn:hover { transform: scale(1.04); opacity: .92; }
    .ig-tagline {
      font-size: 11px;
      color: var(--gray);
      margin-top: 10px;
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    .hidden { display: none !important; }

    @media (max-width: 480px) {
      .header { padding: 24px 22px 20px; }
      .chat { padding: 20px 22px; }
      .input-area { padding: 0 22px 24px; }
      .progress-wrap { padding: 14px 22px 0; }
      .scale-btn { width: 40px; height: 40px; font-size: 14px; }
    }
  </style>
</head>
<body>

<div class="card" id="card">

  <div class="header">
    <div class="header-badge">✦ Acesso Exclusivo</div>
    <div class="header-title"><span>MÉDICO</span> Premium</div>
    <div class="header-subtitle">Faça parte agora da nova geração de médicos.</div>
    <div class="header-sub">Leva apenas <strong style="color:var(--gold)">2 minutos</strong> para preencher — e ao final você recebe um <strong style="color:var(--gold)">e-book exclusivo</strong> ensinando tudo que não querem que você saiba sobre Inteligência Artificial e Marketing Médico.</div>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-meta">
      <span id="stepLabel">Iniciando...</span>
      <span id="stepCount">0 / 9</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div class="chat" id="chat"></div>
  <div class="input-area" id="inputArea"></div>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyV7oERfcQHGJUlceFYtj31zelf02B0v8IK_Y3rlzevaC1jJiZ7ethBh5oJTSh6YR_t/exec";

const answers = {};
let currentStep = 0;

const STEPS = [
  {
    key: "nome",
    msg: "Olá! Você está prestes a entrar para um novo mundo do marketing médico.<br><br>Qual é o seu <strong>nome</strong>?",
    type: "text",
    placeholder: "Seu nome completo"
  },
  {
    key: "formado",
    msg: (a) => `Prazer, <strong>${a.nome}</strong>! 🎓<br><br>Você já está <strong>formado(a)</strong>?`,
    type: "options",
    options: ["Sim, já sou formado(a)", "Ainda estou cursando", "Sou residente"]
  },
  {
    key: "especialidade",
    msg: "Qual é a sua <strong>especialidade médica</strong>?<br><span style='font-size:13px;color:#888'>Se ainda estiver cursando, informe a área.</span>",
    type: "text",
    placeholder: "Ex: Cardiologista, Dermatologista, Clínico Geral..."
  },
  {
    key: "whatsapp",
    msg: "Perfeito! Agora me informe seu <strong>WhatsApp com DDD</strong> para entrarmos em contato:",
    type: "text",
    placeholder: "(11) 99999-9999"
  },
  {
    key: "pretensao_receita",
    msg: "Qual é a sua <strong>pretensão de receita</strong> que deseja alcançar com as ações de marketing?",
    type: "options",
    options: ["Até R$ 20 mil/mês", "R$ 20 mil a R$ 50 mil/mês", "R$ 50 mil a R$ 100 mil/mês", "Acima de R$ 100 mil/mês"]
  },
  {
    key: "investimento_trafego",
    msg: "Qual valor de <strong>investimento em tráfego pago</strong> você está disposto(a) a fazer mensalmente?",
    type: "options",
    options: ["Até R$ 500/mês", "R$ 500 a R$ 1.500/mês", "R$ 1.500 a R$ 3.000/mês", "Acima de R$ 3.000/mês"]
  },
  {
    key: "agencia_atual",
    msg: "Atualmente você <strong>já trabalha com alguma agência</strong> de marketing?",
    type: "options",
    options: ["Sim, tenho agência", "Já tive, mas não tenho mais", "Nunca trabalhei com agência"]
  },
  {
    key: "conhece_jubarthi",
    msg: "Você já <strong>ouviu falar da Jubarthi</strong> antes?",
    type: "options",
    options: ["Sim, já conhecia", "Ouvi falar recentemente", "Não conhecia, vim por indicação", "Não conhecia"]
  },
  {
    key: "como_chegou",
    msg: "Última! 🏆<br><br>Como você chegou até a <strong>Jubarthi</strong>?",
    type: "options",
    options: ["Indicação de colega", "Instagram / Redes sociais", "Google / pesquisa", "Evento ou congresso", "LinkedIn", "Outro"]
  }
];

const TOTAL = STEPS.length;
const chat = document.getElementById("chat");
const inputArea = document.getElementById("inputArea");

function updateProgress(step) {
  const pct = Math.round((step / TOTAL) * 100);
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("stepCount").textContent = step + " / " + TOTAL;
  document.getElementById("stepLabel").textContent =
    step === 0 ? "Vamos começar" :
    step < 4 ? "Seus dados" :
    step < 8 ? "Perfil profissional" : "Finalizando";
}

function addBotBubble(html, cb) {
  const typing = document.createElement("div");
  typing.className = "bubble-bot";
  typing.innerHTML = `<div class="avatar">⭐</div><div class="bot-text"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  chat.appendChild(typing);
  scrollChat();
  setTimeout(() => {
    typing.remove();
    const bubble = document.createElement("div");
    bubble.className = "bubble-bot";
    bubble.innerHTML = `<div class="avatar">⭐</div><div class="bot-text">${html}</div>`;
    chat.appendChild(bubble);
    scrollChat();
    if (cb) cb();
  }, 700 + Math.random() * 300);
}

function addUserBubble(text) {
  const b = document.createElement("div");
  b.className = "bubble-user";
  b.innerHTML = `<div class="user-text">${escHtml(text)}</div>`;
  chat.appendChild(b);
  scrollChat();
}

function scrollChat() {
  chat.scrollTop = chat.scrollHeight;
  window.scrollTo(0, document.body.scrollHeight);
}

function escHtml(t) {
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function clearInput() { inputArea.innerHTML = ""; }

function renderInput(step) {
  const s = STEPS[step];
  clearInput();

  if (s.type === "text") {
    const wrap = document.createElement("div");
    wrap.className = "text-wrap";
    const inp = document.createElement("input");
    inp.className = "text-input";
    inp.placeholder = s.placeholder || "";
    const btn = document.createElement("button");
    btn.className = "send-btn";
    btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>`;
    const submit = () => {
      const val = inp.value.trim();
      if (!val) return;
      advance(s.key, val);
    };
    btn.addEventListener("click", submit);
    inp.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); submit(); } });
    wrap.appendChild(inp);
    wrap.appendChild(btn);
    inputArea.appendChild(wrap);
    setTimeout(() => inp.focus(), 100);

  } else if (s.type === "options") {
    const wrap = document.createElement("div");
    wrap.className = "options-wrap";
    s.options.forEach(opt => {
      const btn = document.createElement("button");
      btn.className = "option-btn";
      btn.textContent = opt;
      btn.addEventListener("click", () => advance(s.key, opt));
      wrap.appendChild(btn);
    });
    inputArea.appendChild(wrap);
  }
}

function advance(key, value) {
  answers[key] = value;
  addUserBubble(value);
  clearInput();
  currentStep++;
  updateProgress(currentStep);
  if (currentStep >= TOTAL) { sendData(); return; }
  const s = STEPS[currentStep];
  const msg = typeof s.msg === "function" ? s.msg(answers) : s.msg;
  addBotBubble(msg, () => renderInput(currentStep));
}

function start() {
  updateProgress(0);
  addBotBubble(STEPS[0].msg, () => renderInput(0));
}

function sendData() {
  document.getElementById("progressWrap").classList.add("hidden");
  clearInput();
  addBotBubble("Excelente! Estamos registrando seus dados... ⏳");
  setTimeout(() => {
    let done = false;
    const finish = () => { if (!done) { done = true; showSuccess(); } };
    if (SCRIPT_URL === "https://script.google.com/macros/s/AKfycbyV7oERfcQHGJUlceFYtj31zelf02B0v8IK_Y3rlzevaC1jJiZ7ethBh5oJTSh6YR_t/exec") { finish(); return; }
    const params = new URLSearchParams(answers).toString();
    const img = new Image();
    img.src = SCRIPT_URL + "?" + params;
    img.onload = finish;
    img.onerror = finish;
    setTimeout(finish, 3000);
  }, 1200);
}

function showSuccess() {
  document.getElementById("chat").classList.add("hidden");
  document.getElementById("inputArea").classList.add("hidden");
  const s = document.createElement("div");
  s.className = "success";
  s.innerHTML = `
    <div class="success-icon">🏆</div>
    <div class="success-title">Parabéns, <span>você está dentro!</span></div>
    <div class="success-sub">Nossa equipe entrará em contato com você em breve pelo WhatsApp.<br>Prepare-se para fazer parte da maior agência de marketing médico do Brasil. 🐋</div>
    <div class="success-divider"></div>
    <a href="https://www.instagram.com/jubarthi" target="_blank" class="ig-btn">
      <svg viewBox="0 0 24 24" fill="white" width="20" height="20"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
      Seguir a Jubarthi no Instagram
    </a>
    <div class="ig-tagline">Atuação em mais de 70% do Brasil</div>
  `;
  document.getElementById("card").appendChild(s);
}

start();
</script>
</body>
</html>
